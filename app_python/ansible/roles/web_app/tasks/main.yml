---
- name: Debug variables
  debug:
    msg:
      - "username: {{ dockerhub_username }}"
      - "password: {{ dockerhub_password | default('UNDEFINED') }}"
      - "app_name: {{ app_name }}"
  no_log: false

- name: Login to Docker Hub
  community.docker.docker_login:
    username: "{{ dockerhub_username }}"
    password: "{{ dockerhub_password }}"
  no_log: true

- name: Pull application image
  community.docker.docker_image:
    name: "{{ docker_image }}"
    tag: "{{ docker_tag }}"
    source: pull

- name: Include wipe tasks
  include_tasks: wipe.yml
  tags:
    - web_app_wipe

- name: Deploy with Docker Compose
  block:
    - name: Create application directory
      file:
        path: "{{ compose_project_dir }}"
        state: directory
        mode: "0755"

    - name: Template docker-compose file
      template:
        src: docker-compose.yml.j2
        dest: "{{ compose_project_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Deploy with Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_dir }}"
        state: present
        pull: always
        recreate: auto
      register: compose_result

    - name: Wait for application to be ready
      wait_for:
        port: "{{ app_port }}"
        host: 127.0.0.1
        delay: 5
        timeout: 60

    - name: Verify health endpoint
      uri:
        url: "http://127.0.0.1:{{ app_port }}/health"
        method: GET
        status_code: 200
        return_content: yes

  rescue:
    - name: Compose deployment failed
      debug:
        msg: "Docker Compose deployment encountered an error."

  become: true
  tags:
    - app_deploy
    - compose
