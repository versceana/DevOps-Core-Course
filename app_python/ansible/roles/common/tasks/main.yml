---
- name: Common role tasks
  become: true
  tags: common
  block:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      register: apt_result
      until: apt_result is success
      retries: 3
      delay: 5
      tags: packages

    - name: Install common packages
      ansible.builtin.apt:
        name: "{{ common_packages }}"
        state: present
      tags: packages

    - name: Set timezone to UTC
      community.general.timezone:
        name: UTC
      tags: system

  rescue:
    - name: Handle apt failure
      ansible.builtin.debug:
        msg: "Apt update failed, trying to fix missing keys..."
      tags: packages

    - name: Run apt-get update --fix-missing
      ansible.builtin.command: apt-get update --fix-missing
      changed_when: false
      tags: packages

  always:
    - name: Log common role completion
      ansible.builtin.copy:
        content: "Common role finished at {{ ansible_date_time.iso8601 }}"
        dest: /tmp/ansible-common.log
      tags: always
