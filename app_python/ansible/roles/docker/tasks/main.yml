---
- name: Docker installation
  become: true
  tags:
    - docker
    - docker_install
    - docker_config
  block:
    - name: Install prerequisites for Docker apt repo
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present
        update_cache: true

    - name: Add Docker official GPG key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
      register: docker_gpg_result
      until: docker_gpg_result is success
      retries: 3
      delay: 10

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: true
      notify: restart docker

    - name: Ensure docker service enabled and started
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Add user to docker group
      ansible.builtin.user:
        name: "{{ docker_user_to_add }}"
        groups: docker
        append: true

    - name: Install Python Docker module
      ansible.builtin.apt:
        name: python3-docker
        state: present

  rescue:
    - name: Docker installation failed
      ansible.builtin.debug:
        msg: "Docker installation encountered an error. Check logs."

  always:
    - name: Ensure docker service is started
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
