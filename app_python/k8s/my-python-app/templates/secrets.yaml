apiVersion: v1
kind: Secret
metadata:
  name: {{ include "my-python-app.fullname" . }}-secret
  labels:
    {{- include "my-python-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.secrets.username | default "placeholder_user" }}
  password: {{ .Values.secrets.password | default "placeholder_pass" }}
