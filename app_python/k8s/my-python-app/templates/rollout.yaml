apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "my-python-app.fullname" . }}
  labels:
    {{- include "my-python-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "my-python-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "my-python-app.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.targetPort }}
          name: http
        env:
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: {{ include "my-python-app.fullname" . }}-env
              key: APP_ENV
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: {{ include "my-python-app.fullname" . }}-env
              key: LOG_LEVEL
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
  strategy:
    canary:
      steps:
      - setWeight: 20
      - pause: {}
      - setWeight: 40
      - pause: { duration: 30s }
      - setWeight: 60
      - pause: { duration: 30s }
      - setWeight: 80
      - pause: { duration: 30s }
      - setWeight: 100
