apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "my-python-app.fullname" . }}-post-install"
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: post-install
        image: busybox
        command: ['sh', '-c', 'echo Post-install: smoke test && wget -qO- http://{{ include "my-python-app.fullname" . }}:{{ .Values.service.port }}/health && echo " - OK"']
