apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: python-app-bg
  labels:
    app: python-app-bg
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-app-bg
  template:
    metadata:
      labels:
        app: python-app-bg
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
  strategy:
    blueGreen:
      activeService: python-app-bg-active
      previewService: python-app-bg-preview
      autoPromotionEnabled: false
