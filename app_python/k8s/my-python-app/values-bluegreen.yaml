replicaCount: 2

image:
  repository: nginx
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 80

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi

persistence:
  enabled: false

secrets:
  username: "bg_user"
  password: "bg_pass"

environment: "bluegreen"
logLevel: "INFO"
counterFile: "/data/visits"
